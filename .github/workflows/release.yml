name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. vX.Y.Z)'
        required: true
        type: string
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - pre-release
          - release
        default: pre-release

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          gfortran \
          zlib1g-dev \
          libcurl4-openssl-dev \
          libjpeg-dev \
          libpng-dev \
          libwebp-dev \
          libzstd-dev \
          liblzma-dev \
          libopenjp2-7-dev \
          libnetcdf-dev \
          libaec-dev \
          libncurses5-dev \
          libtiff5-dev \
          libgeotiff-dev \
          libproj-dev

    - name: Install HDF5
      run: |
        cd ${{ github.workspace }}
        wget -q https://github.com/HDFGroup/hdf5/releases/download/2.0.0/hdf5-2.0.0-ubuntu-2404_gcc.tar.gz -O hdf5-release.tar.gz
        tar xzf hdf5-release.tar.gz hdf5/HDF5-2.0.0-Linux.tar.gz
        tar xzf hdf5/HDF5-2.0.0-Linux.tar.gz
        mv HDF5-2.0.0-Linux/HDF_Group/HDF5/2.0.0 hdf5-install

    - name: Cache ecCodes
      id: cache-eccodes
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/eccodes-install
        key: >-
          eccodes-2.38.3-ubuntu-latest-release-
          ${{ hashFiles('.github/workflows/release.yml') }}
        restore-keys: |
          eccodes-2.38.3-ubuntu-latest-release-

    - name: Build ecCodes
      if: steps.cache-eccodes.outputs.cache-hit != 'true'
      run: |
        cd ${{ github.workspace }}
        wget -q https://confluence.ecmwf.int/download/attachments/45757960/eccodes-2.38.3-Source.tar.gz
        tar -xzf eccodes-2.38.3-Source.tar.gz
        cd eccodes-2.38.3-Source
        mkdir build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/eccodes-install \
          -DENABLE_FORTRAN=OFF \
          -DENABLE_PYTHON=OFF \
          -DENABLE_BUILD_TOOLS=ON \
          -DENABLE_ECCODES_THREADS=ON
        make -j$(nproc)
        make install

    - name: Cache CDF library
      id: cache-cdf
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/cdf-install
        key: >-
          cdf-3.9.1-ubuntu-latest-release-
          ${{ hashFiles('.github/workflows/release.yml') }}
        restore-keys: |
          cdf-3.9.1-ubuntu-latest-release-

    - name: Build CDF library
      if: steps.cache-cdf.outputs.cache-hit != 'true'
      run: |
        cd ${{ github.workspace }}
        wget -q https://spdf.gsfc.nasa.gov/pub/software/cdf/dist/latest_cdf/linux/cdf39_1-dist-all.tar.gz
        tar -xzf cdf39_1-dist-all.tar.gz
        cd cdf39_1-dist
        make OS=linux ENV=gnu all
        make INSTALLDIR=${{ github.workspace }}/cdf-install install

    - name: Build vol-bufr
      run: |
        cd vol-bufr
        mkdir build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/hdf5-install;${{ github.workspace }}/eccodes-install" \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install/vol-bufr
        make -j$(nproc)
        make install

    - name: Build vol-cdf
      run: |
        cd vol-cdf
        mkdir build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/hdf5-install;${{ github.workspace }}/cdf-install" \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install/vol-cdf
        make -j$(nproc)
        make install

    - name: Build vol-geotiff
      run: |
        cd vol-geotiff
        mkdir build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/hdf5-install" \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install/vol-geotiff
        make -j$(nproc)
        make install

    - name: Build vol-grib2
      run: |
        cd vol-grib2
        mkdir build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/hdf5-install;${{ github.workspace }}/eccodes-install" \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install/vol-grib2
        make -j$(nproc)
        make install

    - name: Create package
      run: |
        cd ${{ github.workspace }}
        PKG="dataformats-vol-connectors-linux-x86_64"
        mkdir -p "$PKG"
        cp -r install/* "$PKG/"
        cp README.md "$PKG/"

        cat > "$PKG/setup.sh" << 'SETUPEOF'
        #!/bin/bash
        SCRIPT_DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )"
        export HDF5_PLUGIN_PATH="${SCRIPT_DIR}/vol-bufr/lib:${SCRIPT_DIR}/vol-cdf/lib:${SCRIPT_DIR}/vol-geotiff/lib:${SCRIPT_DIR}/vol-grib2/lib"
        echo "HDF5 VOL connectors environment configured."
        echo "HDF5_PLUGIN_PATH=${HDF5_PLUGIN_PATH}"
        SETUPEOF
        chmod +x "$PKG/setup.sh"

        tar -czf "${PKG}.tar.gz" "$PKG"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-package
        path: ./dataformats-vol-connectors-linux-x86_64.tar.gz

  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        brew install \
          cmake \
          gcc \
          zlib \
          curl \
          jpeg \
          libpng \
          webp \
          zstd \
          xz \
          openjpeg \
          netcdf \
          libaec \
          libtiff \
          libgeotiff \
          proj

    - name: Install HDF5
      run: |
        cd ${{ github.workspace }}
        wget -q https://github.com/HDFGroup/hdf5/releases/download/2.0.0/hdf5-2.0.0-macos14_clang.tar.gz -O hdf5-release.tar.gz
        tar xzf hdf5-release.tar.gz hdf5/HDF5-2.0.0-Darwin.tar.gz
        tar xzf hdf5/HDF5-2.0.0-Darwin.tar.gz
        mv HDF5-2.0.0-Darwin/HDF_Group/HDF5/2.0.0 hdf5-install

    - name: Cache ecCodes
      id: cache-eccodes
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/eccodes-install
        key: >-
          eccodes-2.38.3-macos-latest-release-
          ${{ hashFiles('.github/workflows/release.yml') }}
        restore-keys: |
          eccodes-2.38.3-macos-latest-release-

    - name: Build ecCodes
      if: steps.cache-eccodes.outputs.cache-hit != 'true'
      run: |
        cd ${{ github.workspace }}
        wget -q https://confluence.ecmwf.int/download/attachments/45757960/eccodes-2.38.3-Source.tar.gz
        tar -xzf eccodes-2.38.3-Source.tar.gz
        cd eccodes-2.38.3-Source
        mkdir build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/eccodes-install \
          -DENABLE_FORTRAN=OFF \
          -DENABLE_PYTHON=OFF \
          -DENABLE_BUILD_TOOLS=ON \
          -DENABLE_ECCODES_THREADS=ON
        make -j$(sysctl -n hw.ncpu)
        make install

    - name: Install CDF library
      run: |
        curl -sLO https://spdf.gsfc.nasa.gov/pub/software/cdf/dist/latest_cdf/macosx/CDF3_9_1-binary_signed.pkg
        sudo installer -pkg CDF3_9_1-binary_signed.pkg -target /
        sudo chmod -R a+rX /Applications/cdf

    - name: Build vol-bufr
      run: |
        cd vol-bufr
        mkdir build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/hdf5-install;${{ github.workspace }}/eccodes-install" \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install/vol-bufr
        make -j$(sysctl -n hw.ncpu)
        make install

    - name: Build vol-cdf
      run: |
        cd vol-cdf
        mkdir build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/hdf5-install;/Applications/cdf/cdf39_1-dist" \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install/vol-cdf
        DYLD_LIBRARY_PATH=/Applications/cdf/cdf39_1-dist/lib:$DYLD_LIBRARY_PATH \
        make -j$(sysctl -n hw.ncpu)
        make install

    - name: Build vol-geotiff
      run: |
        cd vol-geotiff
        mkdir build && cd build
        BREW_PREFIX=$(brew --prefix)
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/hdf5-install;${BREW_PREFIX}" \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install/vol-geotiff
        make -j$(sysctl -n hw.ncpu)
        make install

    - name: Build vol-grib2
      run: |
        cd vol-grib2
        mkdir build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/hdf5-install;${{ github.workspace }}/eccodes-install" \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install/vol-grib2
        make -j$(sysctl -n hw.ncpu)
        make install

    - name: Create package
      run: |
        cd ${{ github.workspace }}
        PKG="dataformats-vol-connectors-macos"
        mkdir -p "$PKG"
        cp -r install/* "$PKG/"
        cp README.md "$PKG/"

        cat > "$PKG/setup.sh" << 'SETUPEOF'
        #!/bin/bash
        SCRIPT_DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )"
        export HDF5_PLUGIN_PATH="${SCRIPT_DIR}/vol-bufr/lib:${SCRIPT_DIR}/vol-cdf/lib:${SCRIPT_DIR}/vol-geotiff/lib:${SCRIPT_DIR}/vol-grib2/lib"
        export DYLD_LIBRARY_PATH="${HDF5_PLUGIN_PATH}:${DYLD_LIBRARY_PATH}"
        echo "HDF5 VOL connectors environment configured."
        echo "HDF5_PLUGIN_PATH=${HDF5_PLUGIN_PATH}"
        SETUPEOF
        chmod +x "$PKG/setup.sh"

        tar -czf "${PKG}.tar.gz" "$PKG"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-package
        path: ./dataformats-vol-connectors-macos.tar.gz

  build-source:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create source package
      run: |
        cd ${{ github.workspace }}
        PKG="dataformats-vol-connectors-source"
        mkdir -p "$PKG"

        # Copy each connector directory
        for vol in vol-bufr vol-cdf vol-geotiff vol-grib2; do
          cp -r "$vol" "$PKG/"
        done

        # Copy top-level files
        cp README.md "$PKG/"
        cp RELEASE.md "$PKG/"
        [ -f LICENSE ] && cp LICENSE "$PKG/"
        [ -f COPYING ] && cp COPYING "$PKG/"
        [ -f AUTHORS ] && cp AUTHORS "$PKG/"

        tar -czf "${PKG}.tar.gz" \
          --exclude='*/build/*' \
          --exclude='*/_tmp_*' \
          --exclude='*/.vscode/*' \
          "$PKG"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: source-package
        path: ./dataformats-vol-connectors-source.tar.gz

  create-release:
    needs: [build-linux, build-macos, build-source]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Determine release tag
      id: tag
      run: |
        BASE="${{ inputs.version }}"
        if [ "${{ inputs.release_type }}" = "release" ]; then
          echo "tag=${BASE}" >> "$GITHUB_OUTPUT"
        else
          # Find next available preN suffix
          N=1
          while git ls-remote --tags origin "refs/tags/${BASE}-pre${N}" | grep -q .; do
            N=$((N + 1))
          done
          echo "tag=${BASE}-pre${N}" >> "$GITHUB_OUTPUT"
        fi

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: HDF5 VOL connectors ${{ steps.tag.outputs.tag }}
        body_path: RELEASE.md
        draft: false
        prerelease: ${{ inputs.release_type == 'pre-release' }}
        files: |
          artifacts/dataformats-vol-connectors-linux-x86_64.tar.gz
          artifacts/dataformats-vol-connectors-macos.tar.gz
          artifacts/dataformats-vol-connectors-source.tar.gz

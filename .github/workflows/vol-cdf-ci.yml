---
name: CDF VOL CI

'on':
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Build and Test CDF VOL
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        hdf5-version: ['develop']
        build-type: [Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libncurses5-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake

      - name: Cache HDF5
        id: cache-hdf5
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }}
          key: >-
            hdf5-${{ matrix.hdf5-version }}-${{ matrix.os }}-${{ matrix.build-type }}-
            ${{ hashFiles('.github/workflows/vol-cdf-ci.yml') }}
          restore-keys: |
            hdf5-${{ matrix.hdf5-version }}-${{ matrix.os }}-${{ matrix.build-type }}-

      - name: Validate cached HDF5 (macOS)
        if: runner.os == 'macOS' && steps.cache-hdf5.outputs.cache-hit == 'true'
        run: |
          if [ ! -f "${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }}/lib/libhdf5.dylib" ]; then
            echo "Cached HDF5 is incomplete, will rebuild"
            rm -rf "${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }}"
            echo "REBUILD_HDF5=true" >> $GITHUB_ENV
          else
            echo "Cached HDF5 appears valid"
            echo "REBUILD_HDF5=false" >> $GITHUB_ENV
          fi

      - name: Build HDF5
        if: steps.cache-hdf5.outputs.cache-hit != 'true' || (runner.os == 'macOS' && env.REBUILD_HDF5 == 'true')
        run: |
          cd ${{ github.workspace }}
          rm -rf hdf5-${{ matrix.hdf5-version }}
          git clone --depth 1 --branch ${{ matrix.hdf5-version }} \
            https://github.com/HDFGroup/hdf5.git \
            hdf5-${{ matrix.hdf5-version }}
          cd hdf5-${{ matrix.hdf5-version }}
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }} \
            -DHDF5_ENABLE_PARALLEL=OFF \
            -DHDF5_BUILD_TOOLS=ON \
            -DHDF5_BUILD_EXAMPLES=OFF \
            -DHDF5_BUILD_TESTS=OFF \
            -DBUILD_SHARED_LIBS=ON \
            -DHDF5_ENABLE_Z_LIB_SUPPORT=ON \
            -DHDF5_ENABLE_SZIP_SUPPORT=OFF
          if [ "$(uname)" = "Darwin" ]; then
            make -j$(sysctl -n hw.ncpu)
          else
            make -j$(nproc)
          fi
          make install

      - name: Install CDF library (macOS)
        if: runner.os == 'macOS'
        run: |
          # Use prebuilt .pkg instead of building from source on macOS due to Xcode compatibility issues
          curl -sLO https://spdf.gsfc.nasa.gov/pub/software/cdf/dist/latest_cdf/macosx/CDF3_9_1-binary_signed.pkg
          sudo installer -pkg CDF3_9_1-binary_signed.pkg -target /

      # TODO: Remove this step once CDF_BASE path is confirmed
      - name: Inspect CDF install layout (macOS)
        if: runner.os == 'macOS'
        run: sudo ls -R /Applications/cdf/cdf39_1-dist

      - name: Cache CDF library (Linux)
        if: runner.os == 'Linux'
        id: cache-cdf
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/cdf-install
          key: >-
            cdf-3.9.1-${{ matrix.os }}-${{ matrix.build-type }}-
            ${{ hashFiles('.github/workflows/vol-cdf-ci.yml') }}
          restore-keys: |
            cdf-3.9.1-${{ matrix.os }}-${{ matrix.build-type }}-

      - name: Download and build CDF library (Linux)
        if: runner.os == 'Linux' && steps.cache-cdf.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}
          wget -q https://spdf.gsfc.nasa.gov/pub/software/cdf/dist/latest_cdf/linux/cdf39_1-dist-all.tar.gz
          tar -xzf cdf39_1-dist-all.tar.gz
          cd cdf39_1-dist
          make OS=linux ENV=gnu all
          make INSTALLDIR=${{ github.workspace }}/cdf-install install

      - name: Set up CDF environment
        run: |
          if [ "$(uname)" = "Darwin" ]; then
            echo "CDF_BASE=/Applications/cdf/cdf39_1-dist" >> $GITHUB_ENV
            echo "/Applications/cdf/cdf39_1-dist/bin" >> $GITHUB_PATH
          else
            echo "CDF_BASE=${{ github.workspace }}/cdf-install" >> $GITHUB_ENV
            echo "${{ github.workspace }}/cdf-install/bin" >> $GITHUB_PATH
          fi

      - name: Configure CMake
        run: |
          cd vol-cdf
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }};$CDF_BASE"

      - name: Build
        run: |
          cd vol-cdf/build
          if [ "$(uname)" = "Darwin" ]; then
            make -j$(sysctl -n hw.ncpu)
          else
            make -j$(nproc)
          fi

      - name: Run tests
        run: |
          cd vol-cdf/build
          export HDF5_PLUGIN_PATH=$PWD/src
          export HDF5_VOL_CONNECTOR=""
          if [ "$(uname)" = "Darwin" ]; then
            export DYLD_LIBRARY_PATH=${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }}/lib:$CDF_BASE/lib:$DYLD_LIBRARY_PATH
          else
            export LD_LIBRARY_PATH=${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }}/lib:$CDF_BASE/lib:$LD_LIBRARY_PATH
          fi
          export PATH=${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }}/bin:$PATH
          ctest --output-on-failure --verbose

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-cdf-${{ matrix.os }}-${{ matrix.hdf5-version }}-${{ matrix.build-type }}
          path: |
            vol-cdf/build/CMakeFiles/CMakeOutput.log
            vol-cdf/build/CMakeFiles/CMakeError.log
            vol-cdf/build/Testing/Temporary/

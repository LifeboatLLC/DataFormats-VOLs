---
name: GeoTIFF VOL CI

'on':
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build-type: [Release]
        libgeotiff-source: [system, external]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            zlib1g-dev \
            libcurl4-openssl-dev \
            libjpeg-dev \
            libpng-dev \
            libwebp-dev \
            libzstd-dev \
            liblzma-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install \
            cmake \
            zlib \
            curl \
            jpeg \
            libpng \
            webp \
            zstd \
            xz

      - name: Install libtiff for system libgeotiff (Linux)
        if: matrix.libgeotiff-source == 'system' && runner.os == 'Linux'
        run: |
          sudo apt-get install -y libtiff5-dev
          sudo apt-get install -y libgeotiff-dev

      - name: Install libtiff for system libgeotiff (macOS)
        if: matrix.libgeotiff-source == 'system' && runner.os == 'macOS'
        run: |
          brew install libtiff
          brew install libgeotiff

      - name: Cache libtiff
        if: matrix.libgeotiff-source == 'external'
        id: cache-libtiff
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/libtiff-install
          key: >-
            libtiff-v4.6.0-${{ matrix.os }}-${{ matrix.build-type }}-
            ${{ hashFiles('.github/workflows/vol-geotiff-ci.yml') }}
          restore-keys: |
            libtiff-v4.6.0-${{ matrix.os }}-${{ matrix.build-type }}-

      - name: Build libtiff from source
        if: matrix.libgeotiff-source == 'external' && steps.cache-libtiff.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}
          git clone --depth 1 --branch v4.6.0 https://gitlab.com/libtiff/libtiff.git
          cd libtiff
          mkdir tiffbuild && cd tiffbuild
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/libtiff-install \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          if [ "$(uname)" = "Darwin" ]; then
            make -j$(sysctl -n hw.ncpu)
          else
            make -j$(nproc)
          fi
          make install

      - name: Cache libgeotiff
        if: matrix.libgeotiff-source == 'external'
        id: cache-libgeotiff
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/libgeotiff-install
          key: >-
            libgeotiff-main-${{ matrix.os }}-${{ matrix.build-type }}-
            ${{ hashFiles('.github/workflows/vol-geotiff-ci.yml') }}
          restore-keys: |
            libgeotiff-main-${{ matrix.os }}-${{ matrix.build-type }}-

      - name: Install PROJ for external libgeotiff build (Linux)
        if: matrix.libgeotiff-source == 'external' && runner.os == 'Linux'
        run: |
          sudo apt-get install -y libproj-dev

      - name: Install PROJ for external libgeotiff build (macOS)
        if: matrix.libgeotiff-source == 'external' && runner.os == 'macOS'
        run: |
          brew install proj

      - name: Build libgeotiff from source
        if: matrix.libgeotiff-source == 'external' && steps.cache-libgeotiff.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}
          git clone --depth 1 https://github.com/OSGeo/libgeotiff.git
          cd libgeotiff/libgeotiff
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/libtiff-install" \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/libgeotiff-install \
            -DBUILD_SHARED_LIBS=ON
          if [ "$(uname)" = "Darwin" ]; then
            make -j$(sysctl -n hw.ncpu)
          else
            make -j$(nproc)
          fi
          make install

      - name: Install HDF5
        run: |
          cd ${{ github.workspace }}
          if [ "$(uname)" = "Darwin" ]; then
            wget -q https://github.com/HDFGroup/hdf5/releases/download/2.0.0/hdf5-2.0.0-macos14_clang.tar.gz -O hdf5-release.tar.gz
            tar xzf hdf5-release.tar.gz hdf5/HDF5-2.0.0-Darwin.tar.gz
            tar xzf hdf5/HDF5-2.0.0-Darwin.tar.gz
            mv HDF5-2.0.0-Darwin/HDF_Group/HDF5/2.0.0 hdf5-install
          else
            wget -q https://github.com/HDFGroup/hdf5/releases/download/2.0.0/hdf5-2.0.0-ubuntu-2404_gcc.tar.gz -O hdf5-release.tar.gz
            tar xzf hdf5-release.tar.gz hdf5/HDF5-2.0.0-Linux.tar.gz
            tar xzf hdf5/HDF5-2.0.0-Linux.tar.gz
            mv HDF5-2.0.0-Linux/HDF_Group/HDF5/2.0.0 hdf5-install
          fi

      - name: Configure CMake (system libgeotiff)
        if: matrix.libgeotiff-source == 'system'
        run: |
          cd vol-geotiff
          mkdir build && cd build
          # Add Homebrew prefix on macOS so pkg-config can find packages
          if [ "$(uname)" = "Darwin" ]; then
            BREW_PREFIX=$(brew --prefix)
            export PKG_CONFIG_PATH="${BREW_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH}"
            CMAKE_PREFIX_PATH="${{ github.workspace }}/hdf5-install;${BREW_PREFIX}"
          else
            CMAKE_PREFIX_PATH="${{ github.workspace }}/hdf5-install"
          fi
          cmake .. \
            -DSITE="ubu" -DBUILDNAME="vol-geotiff/${{ matrix.build-type }}"  \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}"

      - name: Configure CMake (external libgeotiff)
        if: matrix.libgeotiff-source == 'external'
        run: |
          cd vol-geotiff
          mkdir build && cd build
          cmake .. \
            -DSITE="ubu" -DBUILDNAME="vol-geotiff/${{ matrix.build-type }}"  \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/hdf5-install;${{ github.workspace }}/libtiff-install;${{ github.workspace }}/libgeotiff-install"

      - name: Build
        run: |
          cd vol-geotiff
          cd build
          if [ "$(uname)" = "Darwin" ]; then
            make -j$(sysctl -n hw.ncpu)
          else
            make -j$(nproc)
          fi

      - name: Run basic tests (system libgeotiff)
        if: matrix.libgeotiff-source == 'system'
        run: |
          cd vol-geotiff
          cd build
          export HDF5_PLUGIN_PATH=$PWD/src
          if [ "$(uname)" = "Darwin" ]; then
            export DYLD_LIBRARY_PATH=${{ github.workspace }}/hdf5-install/lib:$DYLD_LIBRARY_PATH
          else
            export LD_LIBRARY_PATH=${{ github.workspace }}/hdf5-install/lib:$LD_LIBRARY_PATH
          fi
          export PATH=${{ github.workspace }}/hdf5-install/bin:$PATH
          ctest -D Experimental
          make test

      - name: Run basic tests (external libgeotiff)
        if: matrix.libgeotiff-source == 'external'
        run: |
          cd vol-geotiff
          cd build
          export HDF5_PLUGIN_PATH=$PWD/src
          if [ "$(uname)" = "Darwin" ]; then
            export DYLD_LIBRARY_PATH=${{ github.workspace }}/hdf5-install/lib:${{ github.workspace }}/libtiff-install/lib:${{ github.workspace }}/libgeotiff-install/lib:$DYLD_LIBRARY_PATH
          else
            export LD_LIBRARY_PATH=${{ github.workspace }}/hdf5-install/lib:${{ github.workspace }}/libtiff-install/lib:${{ github.workspace }}/libgeotiff-install/lib:$LD_LIBRARY_PATH
          fi
          export PATH=${{ github.workspace }}/hdf5-install/bin:$PATH
          ctest -D Experimental
          make test

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: >-
            build-logs-${{ matrix.os }}-${{ matrix.build-type }}
          path: |
            vol-geotiff/build/CMakeFiles/CMakeOutput.log
            vol-geotiff/build/CMakeFiles/CMakeError.log
            vol-geotiff/build/Testing/Temporary/

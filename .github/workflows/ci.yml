---
name: CI

'on':
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        hdf5-version: ['develop', 'hdf5_1_14_6']
        build-type: [Release, Debug]
        libgeotiff-source: [system, external]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            zlib1g-dev \
            libcurl4-openssl-dev \
            libjpeg-dev \
            libpng-dev \
            libwebp-dev \
            libzstd-dev \
            liblzma-dev

      - name: Install libtiff for system libgeotiff
        if: matrix.libgeotiff-source == 'system'
        run: |
          sudo apt-get install -y libtiff5-dev

      - name: Install libgeotiff from system packages
        if: matrix.libgeotiff-source == 'system'
        run: |
          sudo apt-get install -y libgeotiff-dev

      - name: Cache libtiff
        if: matrix.libgeotiff-source == 'external'
        id: cache-libtiff
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/libtiff-install
          key: >-
            libtiff-external-${{ matrix.os }}-
            ${{ github.run_number }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Build libtiff from source
        if: matrix.libgeotiff-source == 'external' && steps.cache-libtiff.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}
          git clone --depth 1 --branch v4.6.0 https://gitlab.com/libtiff/libtiff.git
          cd libtiff
          mkdir tiffbuild && cd tiffbuild
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/libtiff-install \
            -DBUILD_SHARED_LIBS=ON
          make -j$(nproc)
          make install

      - name: Cache libgeotiff
        if: matrix.libgeotiff-source == 'external'
        id: cache-libgeotiff
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/libgeotiff-install
          key: >-
            libgeotiff-external-${{ matrix.os }}-
            ${{ github.run_number }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install PROJ for external libgeotiff build
        if: matrix.libgeotiff-source == 'external'
        run: |
          sudo apt-get install -y libproj-dev

      - name: Build libgeotiff from source
        if: matrix.libgeotiff-source == 'external' && steps.cache-libgeotiff.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}
          git clone --depth 1 https://github.com/OSGeo/libgeotiff.git
          cd libgeotiff/libgeotiff
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/libtiff-install" \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/libgeotiff-install \
            -DBUILD_SHARED_LIBS=ON
          make -j$(nproc)
          make install

      - name: Cache HDF5
        id: cache-hdf5
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }}
          key: >-
            hdf5-${{ matrix.hdf5-version }}-${{ matrix.os }}-
            ${{ github.run_number }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Build HDF5
        if: steps.cache-hdf5.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}
          git clone --depth 1 --branch ${{ matrix.hdf5-version }} \
            https://github.com/HDFGroup/hdf5.git \
            hdf5-${{ matrix.hdf5-version }}
          cd hdf5-${{ matrix.hdf5-version }}
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }} \
            -DHDF5_ENABLE_PARALLEL=OFF \
            -DHDF5_BUILD_TOOLS=ON \
            -DHDF5_BUILD_EXAMPLES=OFF \
            -DHDF5_BUILD_TESTS=OFF \
            -DBUILD_SHARED_LIBS=ON \
            -DHDF5_ENABLE_Z_LIB_SUPPORT=ON \
            -DHDF5_ENABLE_SZIP_SUPPORT=OFF
          make -j$(nproc)
          make install

      - name: Configure CMake (system libgeotiff)
        if: matrix.libgeotiff-source == 'system'
        run: |
          cd vol-geotiff
          mkdir build && cd build
          cmake .. \
            -DSITE="ubu" -DBUILDNAME="vol-geotiff/${{ matrix.build-type }}"  \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }}"

      - name: Configure CMake (external libgeotiff)
        if: matrix.libgeotiff-source == 'external'
        run: |
          cd vol-geotiff
          mkdir build && cd build
          cmake .. \
            -DSITE="ubu" -DBUILDNAME="vol-geotiff/${{ matrix.build-type }}"  \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }};${{ github.workspace }}/libtiff-install;${{ github.workspace }}/libgeotiff-install"

      - name: Build
        run: |
          cd vol-geotiff
          cd build
          make -j$(nproc)

      - name: Run basic tests (system libgeotiff)
        if: matrix.libgeotiff-source == 'system'
        run: |
          cd vol-geotiff
          cd build
          export HDF5_PLUGIN_PATH=$PWD/src
          export LD_LIBRARY_PATH=${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }}/lib:$LD_LIBRARY_PATH
          export PATH=${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }}/bin:$PATH
          ctest -D Experimental
          make test

      - name: Run basic tests (external libgeotiff)
        if: matrix.libgeotiff-source == 'external'
        run: |
          cd vol-geotiff
          cd build
          export HDF5_PLUGIN_PATH=$PWD/src
          export LD_LIBRARY_PATH=${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }}/lib:${{ github.workspace }}/libtiff-install/lib:${{ github.workspace }}/libgeotiff-install/lib:$LD_LIBRARY_PATH
          export PATH=${{ github.workspace }}/hdf5-${{ matrix.hdf5-version }}/bin:$PATH
          ctest -D Experimental
          make test

      #- name: Test HDF5 tools integration

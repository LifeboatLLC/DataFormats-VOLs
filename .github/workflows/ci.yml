      #    fi

          # Test h5dump
      #    if [ -f ../test/sample.tif ] && command -v h5dump >/dev/null 2>&1; then
      #      echo "Testing h5dump with GeoTIFF VOL connector..."
      #      h5dump --vol-name=geotiff_vol_connector ../test/sample.tif || \
